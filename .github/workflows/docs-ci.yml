name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host native dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dbus python3-gi gir1.2-glib-2.0 playerctl

      - name: Run host unit tests
        run: /usr/bin/python3 -m unittest tests/test_protocol_mapping.py tests/test_adb_transport.py tests/test_adb_recovery.py tests/test_live_failure_mapping.py tests/test_position_projection.py tests/test_artwork_cache.py tests/test_android_setup.py

      - name: Compile Python entry points
        run: /usr/bin/python3 -m py_compile host/waydroid_mpris/*.py scripts/run-host-mpris-live.py scripts/run-host-mpris-fixture.py scripts/doctor.py scripts/resolve-waydroid-adb-target.py scripts/run-disruptive-waydroid-restart-qa.py

      - name: Check shell helpers
        run: bash -n scripts/*.sh

      - name: Check generated user service
        run: PYTHON=/usr/bin/python3 ./scripts/install-user-service.sh --dry-run

      - name: Build Android companion
        run: ./scripts/build-android-probe.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            _docs/**/*.md
            _evals/**/*.md
            README.md
            AGENTS.md
            TODO.md
            QUICKSTART.md
            !_docs/archives/**/*
            !_docs/standards/templates/**/*
          config: .markdownlint.jsonc

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check Deno script formatting
        run: deno fmt --check scripts/*.mjs

      - name: Validate frontmatter
        run: deno run --allow-read --allow-env --allow-run=git scripts/validate-frontmatter.mjs

      - name: Validate TODO
        run: deno run --allow-read scripts/validate-todo.mjs

      - name: Validate doc links
        run: deno run --allow-read --allow-env --allow-run=git scripts/validate-doc-links.mjs

      - name: Validate QA docs
        run: deno run --allow-read --allow-env --allow-run=git scripts/validate-qa.mjs

      - name: Test validators against fixtures
        run: deno run --allow-read --allow-env --allow-run scripts/test-validators.mjs
